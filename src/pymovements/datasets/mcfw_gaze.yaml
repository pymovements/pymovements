name: MCFW-Gaze

long_name: Multi-Context Free-Viewing and Web-Browsing Gaze Dataset

description: |
  MCFW-Gaze dataset :cite:p:`MCFW-Gaze-Paper` :cite:p:`MCFW-Gaze-Zenodo`.

  Multi-context eye-tracking dataset recorded with a Tobii Pro Fusion (120 Hz)
  from 15 participants across four task types: natural image free-viewing
  (100 images, 3 sessions, 5 seconds per image), gaze-pattern authentication (5 trials),
  password experiment (5 blocks), and free web browsing
  (news, shopping, and video, 600 seconds per task).

  Eye-tracking data is provided as binocular gaze point coordinates on the
  display area, along with pupil diameter and gaze origin in user coordinates.

  Check the respective paper :cite:p:`MCFW-Gaze-Paper` and zenodo page :cite:p:`MCFW-Gaze-Zenodo`
  for details.

resources:
  - content: participants
    source:
      url: https://zenodo.org/records/20300972/files/dataset.zip?download=1
      filename: dataset.zip
      md5: 5e04a7b5e50f7508775e1daea527246b
    filename_pattern: 'participants.tsv'
    load_kwargs:
      read_csv_kwargs:
        schema:
          ID: !polars.String
          gender: !polars.String
          age: !polars.Int64
          glasses: !polars.String
          Memo: !polars.String
      rename:
        ID: participant_id
  - content: gaze
    source:
      url: https://zenodo.org/records/20300972/files/dataset.zip?download=1
      filename: dataset.zip
      md5: 5e04a7b5e50f7508775e1daea527246b
    filename_pattern: 'dataset/data/participant_{participant_id:d}/(?P<task>gaze_pattern_auth|image|news|password_experiment|shopping|video)((_{stimulus_id:d})?(_|_trial|_block)?{run:d})?.tsv'
    load_kwargs:
      read_csv_kwargs:
        separator: "\t"
      time_column: device_time_stamp
      time_unit: us
      pixel_columns:
      - left_gaze_point_on_display_area_x
      - left_gaze_point_on_display_area_y
      - right_gaze_point_on_display_area_x
      - right_gaze_point_on_display_area_y
  - content: imagestimulus
    source:
      url: https://zenodo.org/records/20300972/files/dataset.zip?download=1
      filename: dataset.zip
      md5: 5e04a7b5e50f7508775e1daea527246b
    filename_pattern: '{stimulus_id:d}.jpg'

experiment:
  eyetracker:
    sampling_rate: 120
  screen:
    width_px: 1920
    height_px: 1080
    width_cm: 31.0
    height_cm: 17.5
    distance_cm: 65.0
    origin: upper left
