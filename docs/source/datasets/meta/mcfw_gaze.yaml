name: mcfw_gaze
long_name: Multi-Context Free-Viewing and Web-Browsing Gaze Dataset
resources:
- content: gaze
  source:
    url: https://zenodo.org/records/19463338/files/dataset.zip?download=1
    filename: dataset.zip
    md5: 8fdb6e04df4ca2dee59b14edc3ec3aed
  filename_pattern: dataset/data/participant_{participant_id:d}/image_\d+_\d+\.tsv
